<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipboard Server</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
          crossorigin="anonymous">
    <style>
        .content-preview {
            font-family: monospace;
            font-size: 0.8rem;
            max-width: 380px;
            word-break: break-all;
            white-space: pre-wrap;
        }
    </style>
</head>
<body class="bg-light">
<div class="container mt-4 mb-5">

    <div class="d-flex align-items-center mb-4 gap-3">
        <h1 class="mb-0">Clipboard Server</h1>
        <span class="badge bg-secondary fs-6" th:text="${#lists.size(items)} + ' item(s)'"></span>
        <div class="ms-auto d-flex gap-2">
            <a href="/cliphandler-clients.zip" class="btn btn-outline-secondary" download>
                Download Clients
            </a>
            <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addItemModal">
                + Add Item
            </button>
        </div>
    </div>

    <form method="get" action="/" class="row g-2 mb-4">
        <div class="col-auto">
            <input type="text" name="username" class="form-control"
                   placeholder="Filter by user…"
                   th:value="${filterUser}">
        </div>
        <div class="col-auto">
            <button type="submit" class="btn btn-outline-primary">Filter</button>
        </div>
        <div class="col-auto" th:if="${filterUser != null and !#strings.isEmpty(filterUser)}">
            <a href="/" class="btn btn-outline-secondary">Clear filter</a>
        </div>
    </form>

    <div th:if="${#lists.isEmpty(items)}" class="alert alert-info">
        No clipboard items found.
    </div>

    <div class="table-responsive" th:unless="${#lists.isEmpty(items)}">
        <table class="table table-striped table-hover align-middle bg-white shadow-sm rounded">
            <thead class="table-dark">
                <tr>
                    <th>User</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Content</th>
                    <th>Updated</th>
                    <th></th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${items}">
                    <td th:text="${item.username()}"></td>
                    <td><code th:text="${item.name()}"></code></td>
                    <td>
                        <span class="badge bg-purple text-white"
                              style="background-color:#6f42c1"
                              th:if="${item.file()}">File</span>
                        <span class="badge bg-primary"
                              th:unless="${item.file()}">Text</span>
                    </td>
                    <td class="content-preview" th:text="${item.contentPreview()}"></td>
                    <td class="text-nowrap"
                        th:text="${#temporals.format(item.updatedAt(), 'yyyy-MM-dd HH:mm')}"></td>
                    <td>
                        <form th:action="@{/clear/{u}/{n}(u=${item.username()}, n=${item.name()})}"
                              method="post">
                            <input type="hidden" name="filterUser" th:value="${filterUser}">
                            <button type="submit" class="btn btn-danger btn-sm"
                                    onclick="return confirm('Clear this item?')">
                                Clear
                            </button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>

<!-- Add Item Modal -->
<div class="modal fade" id="addItemModal" tabindex="-1" aria-labelledby="addItemModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <form method="post" action="/add">
                <div class="modal-header">
                    <h5 class="modal-title" id="addItemModalLabel">Add Clipboard Item</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="filterUser" th:value="${filterUser}">
                    <div class="mb-3">
                        <label for="addUsername" class="form-label">User</label>
                        <input type="text" class="form-control" id="addUsername" name="username"
                               th:value="${filterUser}" required placeholder="username">
                    </div>
                    <div class="mb-3">
                        <label for="addName" class="form-label">Name</label>
                        <input type="text" class="form-control" id="addName" name="name"
                               required placeholder="item-name">
                    </div>
                    <div class="mb-3">
                        <label for="addContent" class="form-label">Content</label>
                        <textarea class="form-control font-monospace" id="addContent" name="content"
                                  rows="6" required placeholder="Paste your text here…"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-success">Save</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmFCeSz9aNv6Q0oGKE6oDgkWkEE"
        crossorigin="anonymous"></script>
</body>
</html>
