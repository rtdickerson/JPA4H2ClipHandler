spring.application.name=cliphandler

# File-based H2 — persists across restarts; AUTO_SERVER allows multiple connections
spring.datasource.url=jdbc:h2:file:./data/cliphandler;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 web console — available at /h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=8080
